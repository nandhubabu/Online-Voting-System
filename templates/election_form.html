{% extends "base.html" %}
{% block title %}{{ 'Edit' if election else 'New' }} Election — ElectVote{% endblock %}

{% block content %}
<div class="page" style="max-width:640px;">

  <a href="{{ url_for('admin_elections') }}" class="btn btn-ghost btn-sm"
     style="margin-bottom:1.5rem;">← Back to Elections</a>

  <div class="page-head">
    <div class="page-title">{{ 'Edit Election' if election else 'New Election' }}</div>
  </div>

  <div class="card">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label">Election Name</label>
        <input type="text" name="election_name" class="form-input"
               value="{{ election.election_name if election else '' }}"
               placeholder="e.g. 2025 Tamil Nadu Assembly Election" required>
      </div>

      <div class="form-group">
        <label class="form-label">Election Type</label>
        <select name="election_type" class="form-select" required>
          {% for t in ['Parliamentary', 'Assembly', 'Municipal', 'Panchayat'] %}
          <option value="{{ t }}"
            {{ 'selected' if election and election.election_type == t }}>
            {{ t }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Constituency</label>
        <select name="constituency_id" class="form-select" required>
          <option value="">— Select —</option>
          {% for c in constituencies %}
          <option value="{{ c.id }}"
            {{ 'selected' if election and election.constituency_id == c.id }}>
            {{ c.name }} ({{ c.district }}, {{ c.state }})
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Start Date &amp; Time</label>
        <input type="datetime-local" name="start_datetime" class="form-input"
               value="{{ election.start_datetime.strftime('%Y-%m-%dT%H:%M') if election else '' }}"
               required>
      </div>

      <div class="form-group">
        <label class="form-label">End Date &amp; Time</label>
        <input type="datetime-local" name="end_datetime" class="form-input"
               value="{{ election.end_datetime.strftime('%Y-%m-%dT%H:%M') if election else '' }}"
               required>
      </div>

      {% if election %}
      <div class="form-group">
        <label class="form-label">Status</label>
        <select name="status" class="form-select">
          {% for s in ['Draft', 'Scheduled', 'Active', 'Closed', 'Published'] %}
          <option value="{{ s }}" {{ 'selected' if election.status == s }}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}

      <div style="display:flex;gap:.8rem;margin-top:1.5rem;">
        <a href="{{ url_for('admin_elections') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary">
          {{ 'Save Changes' if election else 'Create Election' }}
        </button>
      </div>

    </form>
  </div>
</div>
{% endblock %}
